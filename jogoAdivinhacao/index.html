<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="jogo">
        <h1>Jogo de Adivinhação</h1>
        <p>Pense em um número entre 1 e 100. Você consegue advinhar</p>
        <input type="number" id="palpite" placeholder="seu palpite" min="1" max="100">
        <button id="botaoTentar">Tentar</button>
        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
